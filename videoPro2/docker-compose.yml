version: '3.8'

services:
  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+psycopg2://dedup:dedup@db:5432/dedupdb
      - REDIS_URL=redis://redis:6379/0
      - MINIO_ENDPOINT=storage:9000
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin
      - MINIO_BUCKET=videopro2
      - MAIL_HOST=
      - MAIL_USER=
      - MAIL_PASS=
      - WEBHOOK_TEST_URL=
    depends_on:
      - db
      - redis
      - storage

  worker:
    build: ./backend
    command: celery -A app.worker worker --loglevel=info
    environment:
      - DATABASE_URL=postgresql+psycopg2://dedup:dedup@db:5432/dedupdb
      - REDIS_URL=redis://redis:6379/0
      - MINIO_ENDPOINT=storage:9000
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin
      - MINIO_BUCKET=videopro2
    depends_on:
      - backend
      - redis
      - db
      - storage

  db:
    image: postgres:14
    environment:
      POSTGRES_USER: dedup
      POSTGRES_PASSWORD: dedup
      POSTGRES_DB: dedupdb
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  storage:
    image: minio/minio:RELEASE.2023-09-07T02-05-02Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

volumes:
  db_data:
  minio_data:


