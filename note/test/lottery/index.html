<body>
<div class="warp">

    <h1 class="hide">抽奖组件</h1>
    <!-- 主体内容 -->
    <div class="main">
                <!-- 抽奖模块-->
                <div class="lottery_box">
                    <ul>
                        <li data-lottery="0" class="lottery_item">
                            0

                        <li data-lottery="1" class="lottery_item">

                        <li data-lottery="7" class="lottery_item">
                           7

                        <!-- 抽奖按钮 -->
                        <li class="lottery_start">
                            <a href="javascript:" class="btn_lottery bg t" onclick="startLottery()">开始抽奖</a>
                        </li>

                        <li data-lottery="3" class="lottery_item">
3
                        </li>
                        <li data-lottery="6" class="lottery_item">
                            6
                        </li>
                        <li data-lottery="5" class="lottery_item">

        </div>
</div>
</body>
<script type="text/javascript" src="//ossweb-img.qq.com/images/js/jquery/jquery-1.11.3.min.js"></script>
<script>

    const award_list = [
        {
            id: 0,
            name: '贝尔签名球衣x1',
            img: '1.png'
        },
        {
            id: 1,
            name: '143混合球员x1',
            img: '2.png'
        },
        {
            id: 2,
            name: '142混合球员x1',
            img: '3.png'
        },
        {
            id: 3,
            name: '139混合球员x1',
            img: '4.png'
        },
        {
            id: 4,
            name: '谢谢参与',
            img: '5.png'
        },
        {
            id: 5,
            name: '随机高级转移点券x5',
            img: '8.png'
        },
        {
            id: 6,
            name: '随机高级转移点券x10',
            img: '8.png'
        },
        {
            id: 7,
            name: '140混合球员x1',
            img: '7.png'
        },
    ]

    //抽奖
    //e:中奖序号，必填
    //{ index:初始序号(默认0),css:高亮样式名(默认curr),complete:抽奖完成回调 }，选填
    var lotteryStart = function (e, config) {
        var opt = $.extend({
                index: 0,//初始序号
                css: 'curr',//高亮样式名
                complete: function () {
                    //to do
                }
            }, config),
            item = $('[data-lottery]'),
            parent = item.parent(),
            speedS = 40,
            speedE = 360,
            loop = 6,
            past = 0,
            state = function (s) {
                if (s) parent.attr('data-state', s);
                return parent.attr('data-state');
            },
            git = function (e) {
                for (var i = 0; i < item.length; i++) {
                    if (item.eq(i).attr('data-lottery') == e)
                        return item.eq(i);
                }
            },
            run = function () {
                item.removeClass(opt.css);
                git(opt.index).addClass(opt.css);
                if (past == loop && e == opt.index) {
                    state('结束');
                    opt.complete(opt.index);
                } else {
                    setTimeout(run, speedS + Math.pow(past / loop, 2) * (speedE - speedS));
                }
                opt.index++;
                if (opt.index >= item.length) {
                    past++;
                    opt.index = 0;
                }
            };
        if (state() == '运行') return;
        state('运行');
        run();
    };

    /*
    *  开始抽奖
    *
    * */
    function startLottery() {
        $('.btn_lottery').addClass('ing')
        lotteryStart(6, {
            index: 0,//初始4
            complete: function (e) {
                setTimeout(function () {
                    alert(award_list[e].name)
                }, 400);
            }
        });
    }
</script>
