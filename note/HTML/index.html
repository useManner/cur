      // canvas
      window.onload = function () {
        var canvas = document.getElementById("myCanvas");
        if (canvas.getContext) {
          var ctx = canvas.getContext("2d");

          // 创建一个线性渐变
          var gradient = ctx.createLinearGradient(0, 0, canvas.width, 0);
          gradient.addColorStop(0, "magenta"); // 起始颜色
          gradient.addColorStop(1, "blue"); // 结束颜色

          // 设置字体和样式
          ctx.font = "48px Arial";
          ctx.fillStyle = gradient; // 应用渐变颜色到填充样式

          // 绘制文本
          ctx.fillText("渐变字体", 100, 100); // 在画布上指定位置绘制文本
        } else {
          console.log("Canvas not supported");
        }
      };
      function wrapText(ctx, text, maxWidth) {
        const lines = [];
        let line = "";
        for (let char of text) {
          const testLine = line + char;
          const testWidth = ctx.measureText(testLine).width;
          if (testWidth > maxWidth && line.length > 0) {
            lines.push(line);
            line = char;
          } else {
            line = testLine;
          }
        }
        lines.push(line);
        return lines;
      }

      function drawAdaptiveText({
        canvasId,
        text,
        maxWidth,
        maxFontSize = 32,
        minFontSize = 12,
        lineHeightRatio = 1.2,
        gradientColors = ["#f00", "#00f"],
      }) {
        const canvas = document.getElementById(canvasId);
        const ctx = canvas.getContext("2d");

        const canvasWidth = canvas.width;
        const canvasHeight = canvas.height;

        ctx.clearRect(0, 0, canvasWidth, canvasHeight);

        let fontSize = maxFontSize;
        let lines = [];
        let lineHeight = 0;

        // 自动缩小字体直到能适配高度
        while (fontSize >= minFontSize) {
          ctx.font = `${fontSize}px sans-serif`;
          lines = wrapText(ctx, text, maxWidth);
          lineHeight = fontSize * lineHeightRatio;
          const totalHeight = lines.length * lineHeight;

          // ✅ 同时满足：高度能容纳 + 每行都能放得下（wrapText 已确保）
          if (totalHeight <= canvasHeight) break;

          fontSize--;
        }

        // 设置渐变填充
        const gradient = ctx.createLinearGradient(0, 0, canvasWidth, 0);
        const step = 1 / (gradientColors.length - 1);
        gradientColors.forEach((color, i) => {
          gradient.addColorStop(i * step, color);
        });

        ctx.fillStyle = gradient;
        ctx.textBaseline = "top";

        const offsetY = (canvasHeight - lines.length * lineHeight) / 2;

        lines.forEach((line, i) => {
          ctx.fillText(line, 0, offsetY + i * lineHeight);
        });

        // 👉 提示当前字体大小
        console.log(`Final font size used: ${fontSize}px`);
      }

    <script defer>
      document.addEventListener("dblclick", (e) => {
        e.preventDefault();
        e.stopPropagation();
      });

      const isMobile = /Mobi|Android|ios/i.test(navigator.userAgent);

      let canvas = document.getElementById("canvas");
      let context = canvas.getContext("2d");
      let currentTool = null;
      let isDrawing = false;
      let lastX = 0;
      let lastY = 0;

      function setCanvasSize() {
        if (/Mobi|Android|ios/i.test(navigator.userAgent)) {
          canvas.style.width = "100vw";
          canvas.style.height = "30vh";
          canvas.width = window.innerWidth;
          canvas.height = window.innerHeight * 0.3;
        } else {
          canvas.style.width = "1000px";
          canvas.style.height = "300px";
          canvas.width = 1000;
          canvas.height = 300;
        }
        canvas.style.background = "beige";
      }
      setCanvasSize();

      function removeAllListeners() {
        const clone = canvas.cloneNode(true); // 克隆 canvas，自动去除所有绑定事件
        canvas.parentNode.replaceChild(clone, canvas); // 替换原 canvas
        // 重新获取 context 和重新绑定大小样式
        clone.style.background = "beige";
        clone.style.width = canvas.style.width;
        clone.style.height = canvas.style.height;
        clone.width = canvas.width;
        clone.height = canvas.height;
        context = clone.getContext("2d");
        canvas = clone;
      }

      // 获取事件坐标（支持 mouse / touch）
      function getEventPos(e) {
        const rect = canvas.getBoundingClientRect();
        if (e.touches && e.touches.length > 0) {
          return {
            x: e.touches[0].clientX - rect.left,
            y: e.touches[0].clientY - rect.top,
          };
        } else {
          return {
            x: e.clientX - rect.left,
            y: e.clientY - rect.top,
          };
        }
      }

      function resetCanvasEvents() {
        canvas.onmousedown = null;
        canvas.onmousemove = null;
        canvas.onmouseup = null;
        canvas.onmouseout = null;

        canvas.ontouchstart = null;
        canvas.ontouchmove = null;
        canvas.ontouchend = null;
        canvas.ontouchcancel = null;

        canvas.style.cursor = "default";
        isDrawing = false;
      }

      function onclear() {
        alert("哎呦喂,清除呢");
        context.clearRect(0, 0, canvas.width, canvas.height);
      }

      function eraser() {
        alert("哎呦喂,橡皮擦呢");
        alert("哎呦喂,请按住鼠标或手指擦除哦");
        alert("哎呦喂,橡皮大小20px哦");

        let isErasing = false;

        canvas.style.cursor =
          'url("https://cdn-icons-png.flaticon.com/512/1250/1250615.png"), auto';
        canvas.addEventListener("contextmenu", (e) => e.preventDefault());

        if (currentTool === "eraser") return;
        currentTool = "eraser";
        resetCanvasEvents();

        canvas.style.cursor = "crosshair";

        // 鼠标支持
        canvas.addEventListener("mousedown", (e) => {
          isDrawing = true;
          const { x, y } = getEventPos(e);
          context.globalCompositeOperation = "destination-out";
          context.beginPath();
          context.moveTo(x, y);
        });

        canvas.addEventListener("mousemove", (e) => {
          if (!isDrawing) return;
          const { x, y } = getEventPos(e);
          context.lineTo(x, y);
          context.lineWidth = 20;
          context.stroke();
        });

        canvas.addEventListener("mouseup", () => {
          isDrawing = false;
          context.globalCompositeOperation = "source-over";
        });

        canvas.addEventListener("mouseout", () => {
          isDrawing = false;
          context.globalCompositeOperation = "source-over";
        });

        // 触摸支持
        canvas.addEventListener(
          "touchstart",
          (e) => {
            e.preventDefault();
            isDrawing = true;
            const { x, y } = getEventPos(e);
            context.globalCompositeOperation = "destination-out";
            context.beginPath();
            context.moveTo(x, y);
          },
          { passive: false }
        );

        canvas.addEventListener(
          "touchmove",
          (e) => {
            e.preventDefault();
            if (!isDrawing) return;
            const { x, y } = getEventPos(e);
            context.lineTo(x, y);
            context.lineWidth = 20;
            context.stroke();
          },
          { passive: false }
        );

        canvas.addEventListener("touchend", () => {
          isDrawing = false;
          context.globalCompositeOperation = "source-over";
        });

        canvas.addEventListener("touchcancel", () => {
          isDrawing = false;
          context.globalCompositeOperation = "source-over";
        });
      }

      function randeColor() {
        const r = Math.floor(Math.random() * 256);
        const g = Math.floor(Math.random() * 256);
        const b = Math.floor(Math.random() * 256);
        return `rgb(${r}, ${g}, ${b})`;
      }

      function randeAxis() {
        const width = Math.floor(Math.random() * canvas.width * 0.5) + 1;
        const height = Math.floor(Math.random() * canvas.height * 0.5) + 1;
        return {
          w: width,
          h: height,
          x: Math.floor(Math.random() * (canvas.width - width)),
          y: Math.floor(Math.random() * (canvas.height - height)),
        };
      }

      function rect() {
        const { w, h, x, y } = randeAxis();
        context.clearRect(0, 0, canvas.width, canvas.height);
        context.fillStyle = randeColor();
        context.fillRect(x, y, w, h);
      }

      function circle() {
        const { w, h, x, y } = randeAxis();
        context.clearRect(0, 0, canvas.width, canvas.height);
        context.fillStyle = randeColor();
        context.beginPath();
        context.arc(x + w / 2, y + h / 2, Math.min(w, h) / 2, 0, Math.PI * 2);
        context.fill();
      }

      function line() {
        if (currentTool === "line") return; // 防止重复切换
        currentTool = "line";

        canvas.style.cursor = "crosshair";

        // 先移除旧监听
        removeAllListeners();

        canvas.addEventListener("mousedown", (e) => {
          isDrawing = true;
          const { x, y } = getEventPos(e);
          lastX = x;
          lastY = y;
        });

        canvas.addEventListener("mousemove", (e) => {
          if (!isDrawing) return;
          const { x, y } = getEventPos(e);
          context.beginPath();
          context.moveTo(lastX, lastY);
          context.lineTo(x, y);
          context.strokeStyle = "#000";
          context.lineWidth = 2;
          context.stroke();
          lastX = x;
          lastY = y;
        });

        canvas.addEventListener("mouseup", () => {
          isDrawing = false;
        });

        canvas.addEventListener("mouseout", () => {
          isDrawing = false;
        });

        // 触控事件
        canvas.addEventListener(
          "touchstart",
          (e) => {
            e.preventDefault();
            isDrawing = true;
            const { x, y } = getEventPos(e);
            lastX = x;
            lastY = y;
          },
          { passive: false }
        );

        canvas.addEventListener(
          "touchmove",
          (e) => {
            e.preventDefault();
            if (!isDrawing) return;
            const { x, y } = getEventPos(e);
            context.beginPath();
            context.moveTo(lastX, lastY);
            context.lineTo(x, y);
            context.strokeStyle = "#000";
            context.lineWidth = 2;
            context.stroke();
            lastX = x;
            lastY = y;
          },
          { passive: false }
        );

        canvas.addEventListener("touchend", () => {
          isDrawing = false;
        });

        canvas.addEventListener("touchcancel", () => {
          isDrawing = false;
        });
      }
    </script>

    <script>
      function VirtualList({
        container,
        itemCount,
        estimatedHeight,
        renderItem,
      }) {
        const itemHeights = new Array(itemCount).fill(estimatedHeight);
        const itemOffsets = new Array(itemCount);
        const visibleNodes = [];
        const buffer = 5;

        const inner = document.createElement("div");
        inner.style.position = "relative";
        inner.style.width = "100%";
        container.appendChild(inner);

        calculateOffsets();
        inner.style.height =
          itemOffsets[itemCount - 1] + itemHeights[itemCount - 1] + "px";

        const visibleCount = Math.ceil(
          container.clientHeight / estimatedHeight
        );
        const renderCount = visibleCount + buffer * 2;

        for (let i = 0; i < renderCount; i++) {
          const el = document.createElement("div");
          el.style.position = "absolute";
          el.style.width = "100%";
          el.style.willChange = "transform";
          inner.appendChild(el);
          visibleNodes.push(el);
        }

        function calculateOffsets() {
          let offset = 0;
          for (let i = 0; i < itemCount; i++) {
            itemOffsets[i] = offset;
            offset += itemHeights[i];
          }
        }

        function render() {
          const scrollTop = container.scrollTop;
          const startIndex = findStartIndex(scrollTop);
          const endIndex = Math.min(itemCount - 1, startIndex + renderCount);

          for (let i = 0; i < renderCount && startIndex + i < itemCount; i++) {
            const index = startIndex + i;
            const node = visibleNodes[i];
            node.style.transform = `translateY(${itemOffsets[index]}px)`;
            const content = renderItem(index);
            if (typeof content === "string") {
              node.innerHTML = content;
            } else {
              node.innerHTML = "";
              node.appendChild(content);
            }
          }
        }

        function findStartIndex(scrollTop) {
          let low = 0,
            high = itemCount - 1;
          while (low <= high) {
            const mid = Math.floor((low + high) / 2);
            if (itemOffsets[mid] < scrollTop) {
              low = mid + 1;
            } else {
              high = mid - 1;
            }
          }
          return Math.max(0, low - buffer);
        }

        function scrollToIndex(index) {
          if (index < 0 || index >= itemCount) return;
          const offset = itemOffsets[index];
          container.scrollTo({
            top: offset,
            behavior: "smooth",
          });
        }

        function updateItemHeight(index, newHeight) {
          if (itemHeights[index] !== newHeight) {
            itemHeights[index] = newHeight;
            calculateOffsets();
            inner.style.height =
              itemOffsets[itemCount - 1] + itemHeights[itemCount - 1] + "px";
            render();
          }
        }

        container.addEventListener("scroll", () =>
          requestAnimationFrame(render)
        );
        render();

        return {
          scrollToIndex,
          updateItemHeight,
        };
      }

      // ✅ 使用
      const total = 10000;
      const container = document.getElementById("list-container");

      const list = VirtualList({
        container,
        itemCount: total,
        estimatedHeight: 40,
        renderItem(index) {
          const el = document.createElement("div");
          el.className = "item";
          const height = 30 + Math.floor(Math.random() * 50);
          el.style.height = height + "px";
          el.textContent = `第 ${index} 项，高度：${height}px`;

          return el;
        },
      });

      function scrollToI() {
        list.scrollToIndex(Math.floor(Math.random() * total));
      }
    </script>
